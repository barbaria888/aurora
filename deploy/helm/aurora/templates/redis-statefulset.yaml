{{- if .Values.services.redis.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "aurora.fullname" . }}-redis
  labels:
    {{- include "aurora.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "aurora.fullname" . }}-redis
  replicas: {{ .Values.replicaCounts.redis }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aurora.name" . }}-redis
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "aurora.name" . }}-redis
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: aurora
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- include "aurora.podSecurityContext" (dict "service" "redis" "global" $ "defaults" (dict "runAsUser" 999 "runAsGroup" 1000 "fsGroup" 1000)) | nindent 8 }}
      {{- include "aurora.scheduling" (dict "service" "redis" "global" $) | nindent 6 }}
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          command: ["redis-server", "--appendonly", "yes", "--dir", "/data", "--maxmemory", {{ .Values.config.REDIS_MAXMEMORY | default "256mb" | quote }}, "--maxmemory-policy", "allkeys-lru"]
          securityContext:
            {{- include "aurora.containerSecurityContext" (dict "service" "redis" "global" $ "defaults" (dict "readOnlyRootFilesystem" true)) | nindent 12 }}
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.resources.redis | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.persistence.redis.size }}
{{- end }}
