apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aurora.fullname" . }}-searxng
  labels:
    {{- include "aurora.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCounts.searxng }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aurora.name" . }}-searxng
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.secrets.app.existingSecret }}
        checksum/secret-app: {{ include (print $.Template.BasePath "/secret-app.yaml") . | sha256sum }}
        {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "aurora.name" . }}-searxng
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: aurora
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- include "aurora.podSecurityContext" (dict "service" "searxng" "global" $ "defaults" (dict "runAsUser" 977 "runAsGroup" 977 "fsGroup" 977)) | nindent 8 }}
      {{- include "aurora.scheduling" (dict "service" "searxng" "global" $) | nindent 6 }}
      containers:
        - name: searxng
          image: searxng/searxng:2025.5.8-7ca24eee4
          imagePullPolicy: IfNotPresent
          securityContext:
            {{- include "aurora.containerSecurityContext" (dict "service" "searxng" "global" $ "defaults" (dict "runAsUser" 977 "runAsGroup" 977)) | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: {{ include "aurora.fullname" . }}-config
            - secretRef:
                name: {{ include "aurora.secretName.app" . }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: searxng-config
              mountPath: /etc/searxng
          resources:
            {{- toYaml .Values.resources.searxng | nindent 12 }}
      volumes:
        - name: searxng-config
          emptyDir: {}
