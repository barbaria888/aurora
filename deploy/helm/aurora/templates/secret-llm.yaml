{{- if not .Values.secrets.llm.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aurora.fullname" . }}-secrets-llm
  labels:
    {{- include "aurora.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- range $key, $value := .Values.secrets.llm }}
  {{- if ne $key "existingSecret" }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
{{- end }}
